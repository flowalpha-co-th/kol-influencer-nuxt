services:
  kol-influencer-nuxt:
    build:
      context: .
      dockerfile: Dockerfile
    image: kol-influencer-nuxt:latest
    container_name: kol-influencer-nuxt
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api}
    ports:
      - "3003:3000"
    networks:
      - shared_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  shared_net:
    external: true
